repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(sim|tests|scripts)/.*\.py$
      - id: ruff-format
        files: ^(sim|tests|scripts)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^sim/.*\.py$
        additional_dependencies:
          - types-pyyaml
          - numpy

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # 5 MB accommodates Phase 2 reference_runs/ messages.jsonl traces;
        # 500 KB was too small for whole-run message logs.
        args: [--maxkb=5000]
